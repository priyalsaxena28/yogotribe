<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Cat Fact - Dark Theme</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0d1b2a, #000814);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      color: #e0eaff;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml;utf8,<svg width="100" height="100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="5" r="1" fill="%23ffffff" fill-opacity="0.15"/><circle cx="20" cy="20" r="1" fill="%23ffffff" fill-opacity="0.15"/><circle cx="50" cy="40" r="1" fill="%23ffffff" fill-opacity="0.15"/><circle cx="70" cy="70" r="1" fill="%23ffffff" fill-opacity="0.15"/><circle cx="90" cy="10" r="1" fill="%23ffffff" fill-opacity="0.15"/></svg>') repeat;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 40px 50px;
      max-width: 460px;
      box-shadow: 0 0 40px #00e0ffaa;
      text-align: center;
      z-index: 1;
      border: 1px solid #00e0ff44;
      color: #c0d8ff;
    }

    h1 {
      margin-bottom: 28px;
      font-weight: 600;
      font-size: 2.4rem;
      color: #00e0ff;
      text-shadow: 0 0 8px #00e0ffaa;
    }

    button {
      background: linear-gradient(45deg, #00e0ff, #0080ff);
      border: none;
      color: #001f33;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 16px 38px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 6px 18px #00e0ffcc;
      transition: all 0.3s ease;
      user-select: none;
      letter-spacing: 0.03em;
    }

    button:hover {
      background: linear-gradient(45deg, #0080ff, #00e0ff);
      box-shadow: 0 10px 30px #00bfffcc;
      transform: translateY(-3px);
      color: #fff;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 4px 12px #0080ffcc;
    }

    #fact {
      margin-top: 38px;
      font-size: 1.3rem;
      font-style: italic;
      color: #b0d9ff;
      min-height: 80px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.5s ease;
      user-select: text;
      text-shadow: 0 0 10px #00c0ffbb;
    }

    #fact.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Cat Fact</h1>
    <button id="getFactBtn">Get Cat Fact</button>
    <div id="fact"></div>
  </div>

  <script>
    const button = document.getElementById('getFactBtn');
    const factDiv = document.getElementById('fact');

    button.addEventListener('click', async () => {
      factDiv.classList.remove('visible');
      factDiv.textContent = 'Loading...';
      try {
        const response = await fetch('https://catfact.ninja/fact');
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        factDiv.textContent = `"${data.fact}"`;
        setTimeout(() => factDiv.classList.add('visible'), 50);
      } catch (error) {
        factDiv.textContent = 'Failed to fetch fact. Try again.';
        factDiv.classList.add('visible');
        console.error('Error fetching fact:', error);
      }
    });
  </script>
</body>
</html>
